server.port=8083
spring.application.name=strategy-service
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/trading}
spring.datasource.username=${POSTGRES_USER:trading}
spring.datasource.password=${POSTGRES_PASSWORD:trading}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.threads.virtual.enabled=true
trading-engine.base-url=${TRADING_ENGINE_URL:http://localhost:8081}
