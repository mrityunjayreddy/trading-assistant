spring.application.name=trading-assistant-backend
server.port=8080
trading.symbols=btcusdt,ethusdt,bnbusdt
app.frontend.origin=http://localhost:5173

# ---------------------------------------------------------------------------
# Kafka — publish closed candles to market.kline.* topics
# ---------------------------------------------------------------------------
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# ---------------------------------------------------------------------------
# PostgreSQL — persist closed candles directly to market_data table
# ---------------------------------------------------------------------------
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/trading}
spring.datasource.username=${POSTGRES_USER:trading}
spring.datasource.password=${POSTGRES_PASSWORD:trading}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------------------------
# Proxy downstream service URLs
# ---------------------------------------------------------------------------
proxy.strategy-service.url=${STRATEGY_SERVICE_URL:http://localhost:8083}
proxy.sim-service.url=${SIM_SERVICE_URL:http://localhost:8081}
proxy.ai-service.url=${AI_SERVICE_URL:http://localhost:8084}
