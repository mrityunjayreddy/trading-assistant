server.port=8081
spring.application.name=market-data-service
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.compression.type=lz4
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.request.timeout.ms=30000

marketdata.exchange=binance
marketdata.symbols[0]=btcusdt
marketdata.symbols[1]=ethusdt
marketdata.websocket.base-url=wss://fstream.binance.com/ws
marketdata.websocket.reconnect-delay=5s
marketdata.websocket.max-reconnect-delay=30s
marketdata.kafka.bootstrap-servers=localhost:9092
marketdata.kafka.trade-topic=market.trades
marketdata.stream.auto-start=true

logging.level.root=INFO
logging.level.com.trading.marketdata=INFO
logging.level.org.springframework.web.reactive.socket.client=INFO

# ---------------------------------------------------------------------------
# Kline stream configuration
# ---------------------------------------------------------------------------
marketdata.kline.symbols[0]=btcusdt
marketdata.kline.symbols[1]=ethusdt
marketdata.kline.symbols[2]=solusdt
marketdata.kline.intervals[0]=1m
marketdata.kline.intervals[1]=5m
marketdata.kline.intervals[2]=15m
marketdata.kline.intervals[3]=1h
marketdata.kline.stream-base-url=wss://fstream.binance.com/stream

# ---------------------------------------------------------------------------
# PostgreSQL datasource (read from environment; defaults for local dev)
# ---------------------------------------------------------------------------
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/trading}
spring.datasource.username=${POSTGRES_USER:trading}
spring.datasource.password=${POSTGRES_PASSWORD:trading}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate must NOT manage schema — init.sql owns it
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
