server.port=8084

spring.application.name=ai-service

spring.threads.virtual.enabled=true

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/trading}
spring.datasource.username=${POSTGRES_USER:trading}
spring.datasource.password=${POSTGRES_PASSWORD:trading}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.base-url=https://api.anthropic.com/v1

cors.allowed-origins=[http://localhost:5173,http://localhost:8080](http://localhost:5173,http://localhost:8080)

services.strategy-service-url=${STRATEGY_SERVICE_URL:[http://localhost:8082}](http://localhost:8082})
services.trading-engine-url=${TRADING_ENGINE_URL:[http://localhost:8081}](http://localhost:8081})

logging.level.com.tradingservice.aiservice=DEBUG
logging.level.com.tradingservice.aiservice.learning=INFO
