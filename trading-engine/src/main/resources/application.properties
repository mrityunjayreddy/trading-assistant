spring.application.name=trading-engine

server.port=8082

logging.level.root=INFO
logging.level.com.tradingservice.tradingengine=INFO
logging.level.org.springframework.web.reactive.function.client=INFO

# Optimization requests can include large parameter grids; raise the default WebFlux
# request buffering limit above the 256 KB framework default.
spring.codec.max-in-memory-size=2MB

binance.base-url=https://fapi.binance.com
binance.klines-path=/fapi/v1/klines
binance.connect-timeout=5s
binance.read-timeout=15s
binance.default-limit=1000

trading.simulation.initial-balance=1000.0
trading.simulation.fee-rate=0.0004

trading.optimization.thread-pool-size=6
trading.optimization.top-results-limit=5
trading.optimization.task-timeout=10s
